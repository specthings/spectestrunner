syntax = "proto3";

message GRPCActionRequest {
  string uid = 1;
  string action = 2;
}

message GRPCActionResponse {
  string uid = 1;
  string action = 2;
  string status = 3;
}

message GRPCDescribeTargetRequest {
  string target_id = 1;
}

message GRPCDescribeTargetResponse {
  string target_id = 1;
  string description = 2;
}

message GRPCInputRequest {
  string uid = 1;
}

message GRPCInputResponse {
  string uid = 1;
  bytes data = 2;
}

message GRPCLogRequest {
  string logger_name = 1;
}

message GRPCLogResponse {
  string data = 1;
}

message GRPCRunImageRequest {
  string target_id = 1;
  repeated uint64 breakpoints = 2;
  string path = 3;
  string digest = 4;
  bytes data = 5;
  float execution_timeout_in_seconds = 6;
}

message GRPCRunImageResponse {
  string target_id = 1;
  string path = 2;
  string digest = 3;
  bytes output = 4;
  string status = 5;
  float load_duration_in_seconds = 6;
  float execution_duration_in_seconds = 7;
}

service GRPCService {
  rpc request_action (GRPCActionRequest) returns (GRPCActionResponse);
  rpc request_describe_target (GRPCDescribeTargetRequest) returns (GRPCDescribeTargetResponse);
  rpc request_input (GRPCInputRequest) returns (stream GRPCInputResponse);
  rpc request_log (GRPCLogRequest) returns (stream GRPCLogResponse);
  rpc request_run_image (GRPCRunImageRequest) returns (GRPCRunImageResponse);
}
